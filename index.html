<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <!-- MindAR -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar/dist/mindar-image-prod.js"></script>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <!-- MindAR A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar/dist/mindar-image-aframe-prod.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>
  <a-scene 
      mindar-image="imageTargetSrc: logo.mind;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      color-space="sRGB"
      renderer="colorManagement: true"
      embedded
      gesture-detector
      >
      
    <!-- カメラ -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- 認識ターゲット -->
    <a-entity mindar-image-target="targetIndex: 0">

      <!-- 3Dモデル（相対パスで読み込み） -->
      <a-gltf-model
        src="model.glb"
        position="0 0 0"
        scale="0.5 0.5 0.5"
        rotation="0 0 0">
      </a-gltf-model>

      <!-- 音声（必要ならONに） -->
      <!--
      <a-sound 
        src="url(./audio/voice.mp3)"
        autoplay="true"
        positional="false">
      </a-sound>
      -->

    </a-entity>

  </a-scene>
</body>

</html>
